name: PhotoEditor
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  PhotoEditor:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "PhotoEditor.xcodeproj/**"
          - "project.yml"
          - "README.md"
          - "*.xcworkspace/**"
          - ".DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.example.photoeditor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        FRAMEWORK_SEARCH_PATHS:
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LINKER_FLAGS: "-ObjC"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - framework: "../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/shared.framework"
        embed: false
    preBuildScripts:
      - name: "Build KMP Shared Framework"
        script: |
          export JAVA_HOME=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
          export PATH="$JAVA_HOME/bin:$PATH"
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
