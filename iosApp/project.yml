name: PhotoEditor
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  PhotoEditor:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "PhotoEditor.xcodeproj/**"
          - "project.yml"
          - "README.md"
          - "*.xcworkspace/**"
          - ".DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.example.photoeditor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
